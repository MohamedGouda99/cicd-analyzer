apiVersion: v1
kind: Service
metadata:
  name: {{ include "cicd-analyzer.fullname" . }}-frontend
  labels:
    {{- include "cicd-analyzer.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "cicd-analyzer.frontend.selectorLabels" . | nindent 4 }}
